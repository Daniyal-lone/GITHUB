<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pirates Hive | Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #d4af37; --deep-black: #050505; --ship-gray: #121214; }
        body { font-family: 'Inter', sans-serif; background: var(--deep-black); color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .pirate-font { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--gold); }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d592 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.1); backdrop-filter: blur(10px); }
        
        /* Specialized AR Overlay */
        #ar-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: #000; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        
        /* Cart Animation */
        .cart-count { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bump { transform: scale(1.4); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col">

    <div id="ar-overlay">
        <button onclick="closeAR()" class="absolute top-10 left-6 z-[110] bg-white/10 p-3 rounded-full border border-white/20">✕ Close</button>
        <model-viewer id="ar-viewer" src="burger.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="2" auto-rotate>
            <div slot="ar-button" class="absolute bottom-10 left-1/2 -translate-x-1/2 gold-gradient text-black px-8 py-4 rounded-full font-black pirate-font shadow-2xl">⚔️ SUMMON ON TABLE</div>
        </model-viewer>
    </div>

    <header class="p-8 text-center">
        <h1 class="pirate-font text-4xl gold-text tracking-tighter uppercase mb-1">The Pirates Hive</h1>
        <p class="text-[10px] tracking-[0.5em] uppercase opacity-40">Baramulla • Premium Quarter</p>
    </header>

    <nav class="flex px-6 space-x-4 mb-8">
        <button onclick="switchTab('menu')" id="btn-menu" class="flex-1 py-3 rounded-2xl glass-card font-bold gold-text border-b-2 border-gold">Menu</button>
        <button onclick="switchTab('cart')" id="btn-cart" class="flex-1 py-3 rounded-2xl glass-card opacity-50 font-bold">Cart (<span id="cart-num">0</span>)</button>
    </nav>

    <section id="menu-tab" class="px-6 space-y-6 flex-grow">
        <div class="grid grid-cols-1 gap-4" id="menu-items">
            </div>
    </section>

    <section id="cart-tab" class="hidden px-6 pb-32 flex-grow">
        <h2 class="pirate-font text-2xl mb-6 gold-text">Your Loot</h2>
        <div id="cart-items" class="space-y-4 mb-10">
            </div>

        <div class="glass-card p-6 rounded-[30px] space-y-6">
            <div>
                <h3 class="text-xs uppercase tracking-widest opacity-40 mb-3">Payment Method</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setPayment('Online')" id="pay-online" class="py-4 rounded-2xl border border-gold/20 text-xs font-bold gold-text">Online (UPI)</button>
                    <button onclick="setPayment('Offline')" id="pay-offline" class="py-4 rounded-2xl border border-white/10 text-xs font-bold opacity-50">At Counter</button>
                </div>
            </div>

            <div class="border-t border-white/5 pt-4">
                <div class="flex justify-between mb-2">
                    <span class="opacity-60">Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div id="discount-row" class="flex justify-between mb-2 hidden gold-text font-bold">
                    <span>Pirate's Discount</span>
                    <span id="discount-amt">-₹0</span>
                </div>
                <div class="flex justify-between text-xl font-black mt-4">
                    <span>Total</span>
                    <span id="total-price" class="gold-text">₹0</span>
                </div>
            </div>
        </div>
    </section>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-black/90 backdrop-blur-xl border-t border-white/5 max-w-md mx-auto z-40">
        <div id="insta-gate" class="mb-4">
            <button onclick="triggerFollow()" class="w-full glass-card py-4 rounded-2xl text-[10px] font-black tracking-[0.2em] uppercase gold-text border-gold/40">
                📸 CLAIM 1-10% PIRATE BOUNTY (FOLLOW)
            </button>
        </div>
        <button onclick="finalizeOrder()" class="w-full gold-gradient text-black py-5 rounded-[28px] font-black text-lg shadow-2xl active:scale-95 transition-all">
            ⚓ ANCHOR ORDER
        </button>
    </div>

    <script>
        const inventory = [
            { id: 1, name: 'Zinger Captain', price: 249, model: 'burger.glb', tag: 'Chef Choice' },
            { id: 2, name: 'Treasure Pizza', price: 399, model: 'burger.glb', tag: 'Family Size' },
            { id: 3, name: 'Sea Salt Fries', price: 129, model: 'burger.glb', tag: 'Side' },
            { id: 4, name: 'Pirate Mocktail', price: 159, model: 'burger.glb', tag: 'Fresh' }
        ];

        let cart = [];
        let paymentMethod = 'Online';
        let discountPercent = 0;

        // Tab Management
        function switchTab(tab) {
            document.getElementById('menu-tab').classList.toggle('hidden', tab === 'cart');
            document.getElementById('cart-tab').classList.toggle('hidden', tab === 'menu');
            document.getElementById('btn-menu').classList.toggle('opacity-50', tab === 'cart');
            document.getElementById('btn-cart').classList.toggle('opacity-50', tab === 'menu');
        }

        // Initialize Menu
        const menuList = document.getElementById('menu-items');
        inventory.forEach(item => {
            const div = document.createElement('div');
            div.className = "glass-card p-5 rounded-[30px] flex justify-between items-center";
            div.innerHTML = `
                <div class="flex-grow">
                    <span class="text-[9px] gold-text uppercase font-black">${item.tag}</span>
                    <h3 class="font-bold text-lg">${item.name}</h3>
                    <p class="gold-text font-black">₹${item.price}</p>
                </div>
                <div class="flex flex-col space-y-2">
                    <button onclick="openAR('${item.model}')" class="text-[10px] bg-white/10 px-3 py-2 rounded-xl border border-white/10 font-bold">3D View</button>
                    <button onclick="addToCart(${item.id})" class="text-[10px] gold-gradient text-black px-4 py-2 rounded-xl font-black">Add +</button>
                </div>
            `;
            menuList.appendChild(div);
        });

        // Cart Logic
        function addToCart(id) {
            const item = inventory.find(i => i.id === id);
            cart.push(item);
            updateCartUI();
            const btn = document.getElementById('btn-cart');
            btn.classList.add('bump');
            setTimeout(() => btn.classList.remove('bump'), 300);
        }

        function updateCartUI() {
            document.getElementById('cart-num').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            
            let subtotal = 0;
            cart.forEach((item, index) => {
                subtotal += item.price;
                const div = document.createElement('div');
                div.className = "glass-card p-4 rounded-2xl flex justify-between items-center";
                div.innerHTML = `<span class="text-sm font-bold">${item.name}</span> <div class="flex items-center space-x-4"><span class="text-sm">₹${item.price}</span> <button onclick="removeFromCart(${index})" class="text-red-500">✕</button></div>`;
                container.appendChild(div);
            });

            const discAmt = Math.round(subtotal * (discountPercent / 100));
            document.getElementById('subtotal').innerText = `₹${subtotal}`;
            document.getElementById('discount-amt').innerText = `-₹${discAmt}`;
            document.getElementById('total-price').innerText = `₹${subtotal - discAmt}`;
            
            if(discountPercent > 0) document.getElementById('discount-row').classList.remove('hidden');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Follow Logic (Professional Workaround)
        function triggerFollow() {
            window.open('https://instagram.com/daniyal.lone', '_blank');
            // Professionals use a delay or "Return to Site" logic
            setTimeout(() => {
                if(confirm("Bhai, have you followed @daniyal.lone to unlock the discount?")) {
                    discountPercent = Math.floor(Math.random() * 10) + 1;
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37'] });
                    document.getElementById('insta-gate').innerHTML = `<div class="bg-green-500/20 p-4 rounded-2xl border border-green-500/40 text-center text-xs font-bold text-green-400">PIRATE BOUNTY ACTIVE: ${discountPercent}% OFF!</div>`;
                    updateCartUI();
                }
            }, 2000);
        }

        // AR Control
        function openAR(model) {
            document.getElementById('ar-viewer').src = model;
            document.getElementById('ar-overlay').style.display = 'block';
        }
        function closeAR() { document.getElementById('ar-overlay').style.display = 'none'; }

        // Finalize
        function setPayment(m) {
            paymentMethod = m;
            document.getElementById('pay-online').classList.toggle('border-gold', m === 'Online');
            document.getElementById('pay-offline').classList.toggle('border-gold', m === 'Offline');
        }

        function finalizeOrder() {
            if(cart.length === 0) return alert("Bhai, add some loot to your cart first!");
            const phone = "919103499618";
            const items = cart.map(i => i.name).join(', ');
            const total = document.getElementById('total-price').innerText;
            const text = encodeURIComponent(`⚓ PIRATE ORDER\nItems: ${items}\nTotal: ${total}\nPayment: ${paymentMethod}\n\nProcessed by Pirates Hive 3D.`);
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
