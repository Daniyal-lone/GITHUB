<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ember Lounge | 3D Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        model-viewer { width: 100%; height: 45vh; outline: none; --poster-color: transparent; }
        #ar-button {
            background: linear-gradient(45deg, #f97316, #fb923c);
            border-radius: 50px; padding: 15px 35px;
            font-weight: 700; color: white; border: none;
            position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 12px 30px rgba(249, 115, 22, 0.4);
            white-space: nowrap;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="max-w-md mx-auto px-6 py-12 w-full flex-grow flex flex-col">
        <header class="text-center mb-10">
            <span class="text-orange-500 text-[10px] tracking-[0.5em] uppercase font-bold opacity-80">Table 01 Exclusive</span>
            <h1 class="serif text-4xl mt-3 font-bold tracking-tight">The Ember Lounge</h1>
            <div class="h-0.5 w-12 bg-orange-500/50 mx-auto mt-5 rounded-full"></div>
        </header>

        <div class="relative bg-zinc-900/40 rounded-[45px] border border-white/5 shadow-2xl overflow-hidden mb-12">
            <model-viewer 
                src="burger.glb" 
                ar 
                ar-modes="webxr scene-viewer quick-look" 
                camera-controls 
                shadow-intensity="2" 
                auto-rotate 
                exposure="1.2">
                <button slot="ar-button" id="ar-button">
                    ✨ VIEW ON YOUR TABLE
                </button>
            </model-viewer>
        </div>

        <div class="text-center flex-grow">
            <h2 class="text-3xl font-extrabold mb-3">Signature Zinger</h2>
            <p class="text-zinc-400 text-sm leading-relaxed px-4">
                Experience the crisp through your camera. Point your phone at the table to begin.
            </p>
            <div class="text-3xl font-bold text-orange-500 mt-6">₹249</div>
        </div>

        <button onclick="sendOrder()" class="w-full bg-white text-black py-5 rounded-[28px] font-extrabold text-lg mt-10 active:scale-95 transition-all shadow-2xl">
            PLACE ORDER NOW
        </button>

        <footer class="mt-16 text-[9px] text-center text-zinc-700 tracking-[0.4em] uppercase font-medium">
            Digital Menu Architecture by Daniyal Lone
        </footer>
    </div>

    <script>
        function sendOrder() {
            // Replace with the cafe's actual WhatsApp number
            const phone = "91XXXXXXXXXX"; 
            const text = encodeURIComponent("Assalamu Alaikum! I'd like to order the Signature 3D Zinger Burger from Table 01.");
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
