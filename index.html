<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE PIRATES HIVE | BARAMULLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --cyan: #00f3ff; }
        body { background: #010103; color: white; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .pirate-font { font-family: 'Pirata One', cursive; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 204, 0, 0.15); }
        
        /* Neon Wave Background */
        .ocean-bg { position: fixed; inset: 0; background: linear-gradient(180deg, #020205 0%, #001a2c 100%); z-index: -1; }
        .wave { position: absolute; bottom: 0; left: 0; width: 200%; height: 100px; background: url('https://raw.githubusercontent.com/ybehalf/waves/main/wave.svg'); background-size: 50% 100px; opacity: 0.05; animation: swim 15s linear infinite; }
        @keyframes swim { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* AR Scanner Portal */
        #ar-portal { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
        
        /* Loot Modal */
        #loot-modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.95); }
        .glow-box { box-shadow: 0 0 30px rgba(255, 204, 0, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col">
    <div class="ocean-bg"><div class="wave"></div></div>

    <div id="loot-modal" class="flex flex-col items-center justify-center p-8 text-center backdrop-blur-xl">
        <div class="glass p-10 rounded-[45px] glow-box border-yellow-500">
            <h2 class="pirate-font text-5xl text-yellow-500 mb-2 tracking-wide">Bounty Found</h2>
            <p class="text-[8px] opacity-50 mb-10 tracking-[0.3em] uppercase">Checking Instagram Verification...</p>
            <div id="chest" class="text-7xl mb-10 animate-bounce">🏴‍☠️</div>
            <button onclick="unlockChest()" class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl text-xs tracking-widest uppercase">Open Treasure Chest</button>
        </div>
    </div>

    <div id="ar-portal">
        <button onclick="closeAR()" class="absolute top-12 left-6 z-[1010] glass px-6 py-2 rounded-full text-[10px] font-bold tracking-widest uppercase text-yellow-500">✕ Close Scanner</button>
        <model-viewer id="ar-engine" src="burger.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="2" auto-rotate>
            <button slot="ar-button" class="absolute bottom-12 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-12 py-5 rounded-full font-black text-[10px] tracking-[0.4em] uppercase shadow-2xl">Project Hologram</button>
        </model-viewer>
    </div>

    <header class="pt-16 pb-6 text-center">
        <div class="inline-block px-3 py-1 glass rounded-full mb-4 border-cyan-500/30">
            <span class="text-[7px] text-cyan-400 font-bold tracking-[0.4em] uppercase">System_Active // Baramulla_Node</span>
        </div>
        <h1 class="pirate-font text-6xl text-yellow-500 leading-none drop-shadow-[0_0_15px_rgba(255,204,0,0.4)]">The Pirates Hive</h1>
    </header>

    <div class="px-6 mb-8">
        <div class="glass py-2 overflow-hidden rounded-xl border-white/5 whitespace-nowrap">
            <p class="inline-block animate-marquee text-[8px] font-bold tracking-widest opacity-60">
                • RECENT LOOT: 7% OFF CLAIMED BY USER_294 • DAILY SPECIAL: THE CAPTAIN'S ZINGER • SCAN ANY ITEM FOR 3D • 
            </p>
        </div>
    </div>

    <nav class="flex px-6 space-x-2 mb-8">
        <button onclick="nav('m')" id="nav-m" class="flex-1 py-4 glass rounded-2xl font-black text-[9px] tracking-widest text-yellow-500 border-yellow-500 shadow-[0_0_20px_rgba(255,204,0,0.1)]">THE_MENU</button>
        <button onclick="nav('b')" id="nav-b" class="flex-1 py-4 glass rounded-2xl font-black text-[9px] tracking-widest opacity-30">MY_BILL (<span id="cart-dot">0</span>)</button>
    </nav>

    <section id="v-menu" class="px-6 space-y-4 mb-32">
        <h2 class="text-[9px] font-black tracking-[0.5em] opacity-30 mb-2 uppercase">Galley Selection</h2>
        <div id="item-grid" class="space-y-4"></div>
    </section>

    <section id="v-bill" class="hidden px-6 space-y-6 pb-40">
        <h2 class="pirate-font text-3xl text-yellow-500 italic uppercase">Merchant's Bill</h2>
        <div id="bill-list" class="space-y-3"></div>
        
        <div class="glass p-8 rounded-[40px] space-y-6">
            <div class="flex justify-between text-[10px] font-bold opacity-40 uppercase tracking-widest"><span>Subtotal</span><span id="sub-price">₹0</span></div>
            <div id="disc-row" class="hidden flex justify-between text-[10px] font-bold text-green-400 tracking-widest"><span>Pirate Bounty</span><span id="disc-price">-₹0</span></div>
            <div class="flex justify-between items-end pt-6 border-t border-white/5">
                <span class="text-xs font-black opacity-50 uppercase tracking-widest">Total Due</span>
                <span id="total-price" class="text-5xl font-black text-yellow-500 tracking-tighter">₹0</span>
            </div>
        </div>
    </section>

    <footer class="fixed bottom-0 left-0 right-0 p-6 glass border-t border-yellow-500/20 max-w-md mx-auto z-[500]">
        <div id="follow-box" class="mb-4">
            <button onclick="startBounty()" class="w-full py-4 rounded-2xl bg-yellow-500/5 border border-yellow-500/20 text-[9px] font-black text-yellow-500 tracking-[0.3em] uppercase">
                [ ⚡ UNLOCK 1-10% BOUNTY ]
            </button>
        </div>
        <button onclick="processPayment()" class="w-full py-6 rounded-[30px] bg-yellow-500 text-black font-black text-xs tracking-[0.4em] uppercase shadow-[0_15px_40px_rgba(255,204,0,0.3)]">
            SECURE_ORDER_&_PAY
        </button>
    </footer>

    <script>
        const galley = [
            { id: 1, name: 'Zinger Captain', price: 249, file: 'burger.glb', meta: 'SIGNATURE' },
            { id: 2, name: 'Treasure Pizza', price: 399, file: 'burger.glb', meta: 'XL_CRISP' },
            { id: 3, name: 'Sea Salt Fries', price: 129, file: 'burger.glb', meta: 'PERI_SIDE' },
            { id: 4, name: 'Stormy Coffee', price: 159, file: 'burger.glb', meta: 'COLD_BREW' }
        ];

        let cargo = [];
        let bountyPercent = 0;

        function nav(t) {
            document.getElementById('v-menu').classList.toggle('hidden', t === 'b');
            document.getElementById('v-bill').classList.toggle('hidden', t === 'm');
            document.getElementById('nav-m').style.opacity = t === 'm' ? '1' : '0.3';
            document.getElementById('nav-b').style.opacity = t === 'b' ? '1' : '0.3';
        }

        const grid = document.getElementById('item-grid');
        galley.forEach(t => {
            const el = document.createElement('div');
            el.className = "glass p-6 rounded-[35px] flex justify-between items-center";
            el.innerHTML = `
                <div><span class="text-[7px] text-yellow-500 font-black tracking-widest opacity-60">${t.meta}</span><h3 class="font-black text-xs uppercase tracking-wider mb-1">${t.name}</h3><p class="text-lg font-black text-yellow-500">₹${t.price}</p></div>
                <div class="flex space-x-3">
                    <button onclick="openAR('${t.file}')" class="w-12 h-12 glass rounded-full flex items-center justify-center text-lg">🌌</button>
                    <button onclick="addLoot(${t.id})" class="bg-yellow-500 text-black px-6 py-4 rounded-2xl font-black text-[9px] uppercase tracking-widest">ADD +</button>
                </div>`;
            grid.appendChild(el);
        });

        function addLoot(id) { cargo.push(galley.find(g => g.id === id)); updateUI(); }

        function updateUI() {
            document.getElementById('cart-dot').innerText = cargo.length;
            const bill = document.getElementById('bill-list');
            bill.innerHTML = '';
            let sub = 0;
            cargo.forEach((item, idx) => {
                sub += item.price;
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-2xl flex justify-between text-[10px] font-bold";
                div.innerHTML = `<span>${item.name}</span> <div class="flex items-center space-x-4"><span>₹${item.price}</span><button onclick="dropLoot(${idx})" class="text-red-500">✕</button></div>`;
                bill.appendChild(div);
            });
            const discAmt = Math.round(sub * (bountyPercent/100));
            document.getElementById('sub-price').innerText = `₹${sub}`;
            document.getElementById('disc-price').innerText = `-₹${discAmt}`;
            document.getElementById('total-price').innerText = `₹${sub - discAmt}`;
            if(bountyPercent > 0) document.getElementById('disc-row').classList.remove('hidden');
        }

        function dropLoot(idx) { cargo.splice(idx, 1); updateUI(); }

        function startBounty() {
            window.open('https://instagram.com/daniyal.lone', '_blank');
            setTimeout(() => { document.getElementById('loot-modal').style.display = 'flex'; }, 1000);
        }

        function unlockChest() {
            const chest = document.getElementById('chest');
            chest.innerText = "💥";
            setTimeout(() => {
                bountyPercent = Math.floor(Math.random() * 10) + 1;
                chest.innerHTML = `<span class="text-3xl text-yellow-500">${bountyPercent}% BOUNTY UNLOCKED</span>`;
                confetti({ particleCount: 200, spread: 100, colors: ['#ffcc00', '#ffffff'] });
                setTimeout(() => {
                    document.getElementById('loot-modal').style.display = 'none';
                    document.getElementById('follow-box').innerHTML = `<div class="p-4 rounded-2xl border border-green-500/40 bg-green-500/10 text-center text-[9px] font-black text-green-400 tracking-[0.2em]">PIRATE_BOUNTY_ACTIVE: ${bountyPercent}% DISCOUNT</div>`;
                    updateUI();
                }, 2000);
            }, 600);
        }

        function openAR(f) { document.getElementById('ar-engine').src = f; document.getElementById('ar-portal').style.display = 'block'; }
        function closeAR() { document.getElementById('ar-portal').style.display = 'none'; }

        function processPayment() {
            if(!cargo.length) return alert("GALLEY_EMPTY: Please add items to your bill.");
            const amount = document.getElementById('total-price').innerText.replace('₹', '');
            const upiId = "Lonedaniyal158-2@oksbi"; 
            const upiLink = `upi://pay?pa=${upiId}&pn=Pirates%20Hive&am=${amount}&cu=INR`;
            window.location.href = upiLink;
            
            setTimeout(() => {
                const text = encodeURIComponent(`⚓ PIRATE ORDER: ${cargo.map(i => i.name).join(', ')}\nTOTAL: ₹${amount}\nPAYMENT_METHOD: UPI_DEEP_LINK\n-- SENT VIA PIRATES HIVE OS`);
                window.location.href = `https://wa.me/919103499618?text=${text}`;
            }, 3000);
        }
    </script>
    <style>
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
    </style>
</body>
</html>
