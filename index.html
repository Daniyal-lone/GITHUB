<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pirates Hive | Baramulla</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #08080a; color: #f3f4f6; overflow-x: hidden; }
        .pirate-font { font-family: 'Cinzel', serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.4); }
        model-viewer { width: 100%; height: 40vh; background: radial-gradient(circle, #1a1a2e 0%, #08080a 100%); outline: none; }
        #ar-button {
            background: #d4af37; color: #000; border-radius: 50px; padding: 12px 24px;
            font-weight: 800; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        }
        .discount-modal { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .spin { animation: spin 0.1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col pb-20">

    <div id="discount-modal" class="fixed inset-0 z-50 discount-modal flex flex-col items-center justify-center p-10 text-center">
        <div class="gold-border p-8 rounded-[40px] bg-zinc-900 shadow-2xl">
            <h2 class="pirate-font gold-text text-2xl mb-4">⚓ Bounty Found!</h2>
            <p class="text-xs mb-6 opacity-70">Follow @daniyal.lone to claim your pirate's discount.</p>
            <div id="discount-circle" class="w-32 h-32 rounded-full border-4 border-dashed border-gold flex items-center justify-center mx-auto mb-8">
                <span id="discount-value" class="pirate-font text-4xl gold-text">?%</span>
            </div>
            <button id="claim-btn" onclick="revealLoot()" class="gold-bg text-black font-extrabold py-4 px-8 rounded-2xl w-full">REVEAL LOOT</button>
        </div>
    </div>

    <header class="pt-10 pb-4 text-center">
        <h1 class="pirate-font text-2xl gold-text tracking-widest uppercase">The Pirates Hive</h1>
        <p class="text-[9px] tracking-[0.4em] uppercase opacity-40">Baramulla's 3D Portal</p>
    </header>

    <div class="px-4 mb-6">
        <div class="relative rounded-[35px] overflow-hidden gold-border shadow-2xl bg-zinc-900/40">
            <model-viewer id="main-viewer" src="burger.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="2" auto-rotate>
                <button slot="ar-button" id="ar-button">⚔️ VIEW ON TABLE</button>
            </model-viewer>
            <div class="absolute top-5 left-6">
                <h2 id="current-name" class="pirate-font text-xl gold-text">Treasure Pizza</h2>
                <p id="current-price" class="font-bold text-lg">₹399</p>
                <span id="discount-tag" class="hidden text-[10px] gold-bg text-black px-2 py-0.5 rounded font-bold uppercase ml-2">DISCOUNT APPLIED</span>
            </div>
        </div>
    </div>

    <main class="px-6 space-y-3">
        <h3 class="pirate-font text-[10px] gold-text tracking-[0.3em] uppercase opacity-60 mb-2">The Pirate's Menu</h3>
        
        <div id="menu-container" class="space-y-3">
            </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-black/80 backdrop-blur-md border-t border-zinc-900 max-w-md mx-auto z-40">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="startDiscountMagic()" class="bg-zinc-900 border border-zinc-800 py-4 rounded-2xl text-[10px] font-bold tracking-widest uppercase">
                📸 CLAIM 1-10% OFF
            </button>
            <button onclick="orderWhatsApp()" class="gold-bg text-black py-4 rounded-2xl text-xs font-black shadow-lg">
                ⚓ ORDER NOW
            </button>
        </div>
    </div>

    <script>
        const menuItems = [
            { id: 'burger.glb', name: 'Treasure Pizza', price: 399, desc: 'Loaded with Pepperoni' },
            { id: 'burger.glb', name: 'Zinger Captain', price: 249, desc: 'Spicy & Crispy Fillet' },
            { id: 'burger.glb', name: 'Pirate Wings', price: 229, desc: '6 Pcs Smoky BBQ' },
            { id: 'burger.glb', name: 'Sea-Fries', price: 129, desc: 'Peri-Peri Seasoning' }
        ];

        let selectedItem = menuItems[0];
        let currentDiscount = 0;

        // Load Menu
        const container = document.getElementById('menu-container');
        menuItems.forEach(item => {
            const div = document.createElement('div');
            div.className = "p-4 rounded-2xl border border-zinc-900 bg-zinc-900/50 flex justify-between items-center active:scale-95 transition-all cursor-pointer";
            div.innerHTML = `<div><p class="font-bold text-sm">${item.name}</p><p class="text-[10px] text-zinc-500">${item.desc}</p></div><span class="gold-text font-bold">₹${item.price}</span>`;
            div.onclick = () => selectItem(item);
            container.appendChild(div);
        });

        function selectItem(item) {
            selectedItem = item;
            document.getElementById('main-viewer').src = item.id;
            document.getElementById('current-name').innerText = item.name;
            updatePriceDisplay();
        }

        function updatePriceDisplay() {
            const finalPrice = Math.round(selectedItem.price * (1 - currentDiscount/100));
            document.getElementById('current-price').innerText = `₹${finalPrice}`;
        }

        function startDiscountMagic() {
            window.open('https://instagram.com/daniyal.lone', '_blank');
            setTimeout(() => {
                document.getElementById('discount-modal').style.display = 'flex';
            }, 1000);
        }

        function revealLoot() {
            const btn = document.getElementById('claim-btn');
            const val = document.getElementById('discount-value');
            btn.disabled = true;
            btn.innerText = "OPENING CHEST...";
            
            let count = 0;
            const interval = setInterval(() => {
                val.innerText = Math.floor(Math.random() * 10) + 1 + "%";
                count++;
                if(count > 20) {
                    clearInterval(interval);
                    currentDiscount = Math.floor(Math.random() * 10) + 1;
                    val.innerText = currentDiscount + "%";
                    val.classList.add('scale-125', 'transition-all');
                    btn.innerText = "BOUNTY CLAIMED!";
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
                    
                    setTimeout(() => {
                        document.getElementById('discount-modal').style.display = 'none';
                        document.getElementById('discount-tag').classList.remove('hidden');
                        updatePriceDisplay();
                    }, 2000);
                }
            }, 100);
        }

        function orderWhatsApp() {
            const finalPrice = Math.round(selectedItem.price * (1 - currentDiscount/100));
            const phone = "919103499618";
            const text = encodeURIComponent(`Ahoy! I'd like to order: ${selectedItem.name}\nPrice: ₹${finalPrice}\nDiscount Applied: ${currentDiscount}%\nOrder from 3D Menu.`);
            window.location.href = `https://wa.me/${phone}?text=${text}`;
        }
    </script>
</body>
</html>
